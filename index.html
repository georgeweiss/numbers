<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escola Espacial - Escolha sua Missão!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #1a0533; min-height: 100vh; font-family: 'Baloo 2', cursive; overflow: hidden; user-select: none; }
  
  /* Fundo Estelar */
  .stars { position: fixed; inset: 0; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  .container { 
    position: relative; z-index: 1; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    min-height: 100vh; padding: 20px; text-align: center;
  }

  .title { 
    font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: #ffe066; 
    text-shadow: 0 5px 0 #b37700; margin-bottom: 40px; animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .menu-grid { 
    display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 320px; 
  }

  .menu-card {
    text-decoration: none;
    padding: 25px;
    border-radius: 30px;
    border: 4px solid #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .menu-card:active { transform: scale(0.95); }

  /* Estilo Missão Animais */
  .btn-animals {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    box-shadow: 0 10px 0 #1e8449;
  }

  /* Estilo Missão Números */
  .btn-numbers {
    background: linear-gradient(135deg, #ff9900, #e67e22);
    box-shadow: 0 10px 0 #b35900;
  }

  .icon { font-size: 50px; }
  .label { 
    font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #fff; 
    text-transform: uppercase; letter-spacing: 1px;
  }

  .footer-text { margin-top: 50px; color: rgba(255,255,255,0.5); font-weight: bold; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1 class="title">QUAL É A<br>MISSÃO DE HOJE?</h1>

  <div class="menu-grid">
    <a href="animals.html" class="menu-card btn-animals">
      <span class="icon">🦁</span>
      <span class="label">ANIMAIS</span>
    </a>

    <a href="numbers.html" class="menu-card btn-numbers">
      <span class="icon">🔢</span>
      <span class="label">NÚMEROS</span>
    </a>
  </div>

  <p class="footer-text">🚀 Praticar para decolar!</p>
</div>

<script>
  // Gerador de estrelas igual aos outros apps
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = s.style.height = (Math.random() * 3) + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (Math.random() * 3 + 1) + 's');
    starsContainer.appendChild(s);
  }
</script>

</body>
</html>
