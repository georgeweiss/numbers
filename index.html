<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox Kids - Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { 
    background: #0b1a30; 
    min-height: 100vh; 
    font-family: 'Baloo 2', cursive; 
    overflow: hidden; 
    color: white; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Starry Background */
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  /* Animated Logo */
  .logo-container {
    z-index: 10;
    text-align: center;
    margin-bottom: 40px;
    animation: float 5s ease-in-out infinite;
  }
  .app-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 15vw, 4.5rem);
    letter-spacing: 4px;
    background: linear-gradient(to bottom, #fff 40%, #4dabf7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6));
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  /* Menu Grid */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    width: 85%;
    max-width: 400px;
    z-index: 10;
  }

  .menu-item {
    text-decoration: none;
    padding: 20px;
    border-radius: 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 1.5rem;
    font-weight: 800;
    color: white;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .menu-item:active { transform: scale(0.95); }

  /* Buttons Styling */
  .btn-safari { background: #27ae60; box-shadow: 0 8px 0 #1e8449; }
  .btn-letters { background: #e74c3c; box-shadow: 0 8px 0 #c0392b; }
  .btn-numbers { background: #f1c40f; box-shadow: 0 8px 0 #b7950b; color: #5e3a00; }

  .icon-circle {
    background: rgba(255,255,255,0.2);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  /* Footer Cleaned */
  .version-tag {
    position: absolute;
    bottom: 15px;
    opacity: 0.3;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="logo-container">
  <h1 class="app-title">VOX KIDS</h1>
</div>

<div class="menu-grid">
  <a href="safari.html" class="menu-item btn-safari">
    <span>SAFARI</span>
    <div class="icon-circle">🦁</div>
  </a>

  <a href="letters.html" class="menu-item btn-letters">
    <span>LETTERS</span>
    <div class="icon-circle">Abc</div>
  </a>

  <a href="numbers.html" class="menu-item btn-numbers">
    <span>NUMBERS</span>
    <div class="icon-circle">123</div>
  </a>
</div>

<div class="version-tag">VOX KIDS v1.4.6</div>

<script>
  // Star generation
  const sc = document.getElementById('stars');
  for(let i=0; i<60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--d', (Math.random()*4+2)+'s');
    sc.appendChild(s);
  }
</script>
</body>
</html>
