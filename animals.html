<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox Kids - v1.4.2</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0b1a30; min-height: 100vh; font-family: 'Baloo 2', cursive; overflow: hidden; user-select: none; color: white; }
  
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  .nav-header { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .btn-menu { text-decoration: none; background: #4dabf7; padding: 10px 20px; border-radius: 12px; color: white; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 0 #228be6; }
  .lock-icon { font-size: 1.5rem; opacity: 0.7; cursor: pointer; }

  .counter { color: #a3ffac; font-size: 1rem; font-weight: 800; position: absolute; top: 70px; width: 100%; text-align: center; z-index: 5; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

  .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; gap: 15px; }

  .card { 
    width: min(260px, 65vw); aspect-ratio: 1; border-radius: 45px; 
    display: flex; align-items: center; justify-content: center; 
    border: 4px solid rgba(255,255,255,0.15); animation: float 4s ease-in-out infinite; 
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 75%);
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .emoji { font-size: 120px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4)); }

  .grid-langs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 420px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  
  .name-tag { background: rgba(0,0,0,0.7); padding: 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-align: center; text-transform: uppercase; min-height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }

  .btn-audio { padding: 12px 5px; border-radius: 15px; border: none; color: white; font-weight: 800; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform 0.1s; }
  .btn-audio:active { transform: scale(0.95); }
  .pt { background: #27ae60; box-shadow: 0 4px 0 #1e8449; }
  .es { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
  .en { background: #2980b9; box-shadow: 0 4px 0 #21618c; }

  .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-tool { padding: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.08); color: white; font-size: 1.1rem; cursor: pointer; }
  .btn-tool.recording { background: #ff4757 !important; animation: blink 1s infinite; }
  .btn-tool.success { background: #a3ffac !important; color: #0b1a30; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } }
  .btn-tool:disabled { opacity: 0.1; cursor: not-allowed; }

  .footer { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
  .btn-circle { background: rgba(255,255,255,0.1); border: none; width: 55px; height: 55px; border-radius: 50%; color: white; font-size: 1.3rem; cursor: pointer; }
  .btn-next { padding: 15px 40px; background: #f1c40f; border: none; border-radius: 25px; font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: #7e5109; box-shadow: 0 6px 0 #b7950b; cursor: pointer; }
  .btn-next:disabled { background: #34495e; color: #7f8c8d; box-shadow: 0 6px 0 #2c3e50; opacity: 0.5; }

  .version-tag { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 0.6rem; opacity: 0.4; letter-spacing: 1px; z-index: 5; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="nav-header">
  <a href="#" class="btn-menu">MENU</a>
  <div class="lock-icon" id="lockBtn" onclick="toggleLock()">🔒</div>
</div>

<div class="counter" id="counterUI">Safari Iniciando...</div>

<div class="container">
  <div class="card" id="card">
    <div class="emoji" id="mainEmoji">🐾</div>
  </div>

  <div class="grid-langs">
    <div class="col">
      <div class="name-tag" id="t-pt">---</div>
      <button class="btn-audio pt" onclick="say('pt')"><span>🔊 PT</span><span>🇧🇷</span></button>
      <div class="tools">
        <button class="btn-tool" id="rec-pt" onclick="rec('pt')">🎙️</button>
        <button class="btn-tool" id="play-pt" onclick="play('pt')" disabled>▶️</button>
      </div>
    </div>
    <div class="col">
      <div class="name-tag" id="t-es">---</div>
      <button class="btn-audio es" onclick="say('es')"><span>🔊 ES</span><span>🇲🇽</span></button>
      <div class="tools">
        <button class="btn-tool" id="rec-es" onclick="rec('es')">🎙️</button>
        <button class="btn-tool" id="play-es" onclick="play('es')" disabled>▶️</button>
      </div>
    </div>
    <div class="col">
      <div class="name-tag" id="t-en">---</div>
      <button class="btn-audio en" onclick="say('en')"><span>🔊 EN</span><span>🇺🇸</span></button>
      <div class="tools">
        <button class="btn-tool" id="rec-en" onclick="rec('en')">🎙️</button>
        <button class="btn-tool" id="play-en" onclick="play('en')" disabled>▶️</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-circle" id="prevBtn" onclick="goBack()" disabled>←</button>
    <button class="btn-next" id="nextBtn" onclick="goNext()" disabled>PRÓXIMO ➔</button>
  </div>
</div>

<div class="version-tag">v1.4.2 - ESTÁVEL (CORREÇÃO DE NOMES)</div>

<script>
  // Banco de dados corrigido v1.4.2
  const animals = [
    { pt: "Bisão", es: "Bisonte", en: "Bison", emoji: "🦬", hex: "#5d4037" },
    { pt: "Minhoca", es: "Lombriz", en: "Worm", emoji: "🪱", hex: "#ff8a80" },
    { pt: "Lontra", es: "Nutria", en: "Otter", emoji: "🦦", hex: "#8d6e63" },
    { pt: "Morcego", es: "Murciélago", en: "Bat", emoji: "🦇", hex: "#2c3e50" },
    { pt: "Leão", es: "León", en: "Lion", emoji: "🦁", hex: "#f39c12" },
    { pt: "Tigre", es: "Tigre", en: "Tiger", emoji: "🐯", hex: "#e67e22" },
    { pt: "Zebra", es: "Cebra", en: "Zebra", emoji: "🦓", hex: "#34495e" },
    { pt: "Elefante", es: "Elefante", en: "Elephant", emoji: "🐘", hex: "#95a5a6" }
  ];

  let pool = [...animals];
  let history = [];
  let current = null;
  let records = { pt: null, es: null, en: null };
  let isLocked = true;

  function toggleLock() {
    isLocked = !isLocked;
    document.getElementById('lockBtn').textContent = isLocked ? '🔒' : '🔓';
    checkProgress();
  }

  function checkProgress() {
    const done = records.pt && records.es && records.en;
    document.getElementById('nextBtn').disabled = isLocked && !done;
    
    const n = pool.length;
    let label = n === 1 ? "Falta 1 animal" : (n > 1 ? `Faltam ${n} animais` : "Safari completo! 🏆");
    document.getElementById('counterUI').textContent = label;
  }

  function render(a) {
    current = a;
    document.getElementById('mainEmoji').textContent = a.emoji;
    document.getElementById('t-pt').textContent = a.pt;
    document.getElementById('t-es').textContent = a.es;
    document.getElementById('t-en').textContent = a.en;
    document.getElementById('card').style.background = `linear-gradient(135deg, ${a.hex}aa, #0b1a30)`;
    
    ['pt', 'es', 'en'].forEach(l => {
      records[l] = null;
      document.getElementById(`play-${l}`).disabled = true;
      document.getElementById(`rec-${l}`).className = 'btn-tool';
    });
    
    document.getElementById('prevBtn').disabled = history.length === 0;
    checkProgress();
  }

  function goNext() {
    if (current) history.push(current);
    if (pool.length === 0) pool = [...animals];
    const i = Math.floor(Math.random() * pool.length);
    render(pool.splice(i, 1)[0]);
  }

  function goBack() {
    if (history.length > 0) {
      pool.push(current);
      render(history.pop());
    }
  }

  async function rec(l) {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      const m = new MediaRecorder(s);
      let bits = [];
      const b = document.getElementById(`rec-${l}`);
      b.classList.add('recording');

      m.ondataavailable = e => bits.push(e.data);
      m.onstop = () => {
        records[l] = URL.createObjectURL(new Blob(bits));
        document.getElementById(`play-${l}`).disabled = false;
        b.className = 'btn-tool success';
        s.getTracks().forEach(t => t.stop());
        checkProgress();
      };
      m.start();
      setTimeout(() => m.state === "recording" && m.stop(), 2500);
    } catch (e) { alert("Ative o microfone!"); }
  }

  function say(l) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(current[l]);
    msg.lang = l === 'pt' ? 'pt-BR' : (l === 'es' ? 'es-MX' : 'en-US');
    if(l === 'en') msg.rate = 0.8;
    window.speechSynthesis.speak(msg);
  }

  function play(l) { if(records[l]) new Audio(records[l]).play(); }

  const sc = document.getElementById('stars');
  for(let i=0; i<50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--d', (Math.random()*4+2)+'s');
    sc.appendChild(s);
  }

  window.speechSynthesis.onvoiceschanged = () => { if(!current) goNext(); };
  if(window.speechSynthesis.getVoices().length > 0) goNext();
</script>
</body>
</html>
