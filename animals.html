<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safari da Pronúncia</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0b1a30; min-height: 100vh; font-family: 'Baloo 2', cursive; overflow-x: hidden; user-select: none; }
  
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  .nav-header { position: absolute; top: 15px; left: 15px; z-index: 10; }
  .btn-back { text-decoration: none; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 15px; color: white; font-weight: bold; font-size: 0.9rem; }

  .screen { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; gap: 10px; }
  
  .counter { color: #a3ffac; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }

  .card { 
    width: min(280px, 80vw); aspect-ratio: 1; border-radius: 40px; 
    display: flex; align-items: center; justify-content: center; 
    border: 5px solid rgba(255,255,255,0.3); animation: float 4s ease-in-out infinite; 
    margin-bottom: 15px; position: relative;
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  
  .animal-emoji { font-size: 140px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }

  .lang-container { display: flex; gap: 10px; width: 100%; max-width: 450px; justify-content: center; align-items: flex-end; }
  .lang-column { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
  
  .animal-name-label { 
    color: #fff; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; 
    background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 10px;
    text-align: center; min-height: 1.2rem; width: 90%;
  }

  .lang-btn { width: 100%; padding: 10px 2px; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .lang-btn-pt { background: #009c3b; box-shadow: 0 4px 0 #006622; }
  .lang-btn-es { background: #d52b1e; box-shadow: 0 4px 0 #8a0015; }
  .lang-btn-en { background: #00247d; box-shadow: 0 4px 0 #001a5c; }

  .record-tools-stack { display: flex; flex-direction: column; gap: 5px; width: 100%; }
  .tool-btn { width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.15); color: white; font-size: 1.1rem; display: flex; justify-content: center; }
  .tool-btn:disabled { opacity: 0.1; }
  
  .recording { background: #ff4444 !important; animation: pulse-red 1s infinite; }
  @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .next-btn { margin-top: 20px; padding: 15px 40px; background: #ffe066; border: none; border-radius: 25px; font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: #5e3a00; cursor: pointer; box-shadow: 0 6px 0 #b37700; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="nav-header"><a href="index.html" class="btn-back">🏠 MENU</a></div>

<div class="screen" id="gameScreen">
  <div class="counter" id="counterUI">Safari de Pronúncia</div>
  
  <div class="card" id="card">
    <div class="animal-emoji" id="animalEmoji">🦁</div>
  </div>

  <div class="lang-container">
    <div class="lang-column">
      <div class="animal-name-label" id="label-pt">LEÃO</div>
      <button class="lang-btn lang-btn-pt" onclick="speak('pt')">🇧🇷 PT 🔊</button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-pt" onclick="startRecording('pt')">🎙️</button>
        <button class="tool-btn" id="play-pt" onclick="playRecording('pt')" disabled>▶️</button>
      </div>
    </div>
    <div class="lang-column">
      <div class="animal-name-label" id="label-es">LEÓN</div>
      <button class="lang-btn lang-btn-es" onclick="speak('es')">🇲🇽 MX 🔊</button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-es" onclick="startRecording('es')">🎙️</button>
        <button class="tool-btn" id="play-es" onclick="playRecording('es')" disabled>▶️</button>
      </div>
    </div>
    <div class="lang-column">
      <div class="animal-name-label" id="label-en">LION</div>
      <button class="lang-btn lang-btn-en" onclick="speak('en')">🇺🇸 EN 🔊</button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-en" onclick="startRecording('en')">🎙️</button>
        <button class="tool-btn" id="play-en" onclick="playRecording('en')" disabled>▶️</button>
      </div>
    </div>
  </div>

  <button class="next-btn" onclick="nextAnimal()">PRÓXIMO ➔</button>
</div>

<script>
  // Lista filtrada para 1:1 (Emoji exato)
  const animals = [
    { pt: "Leão", en: "Lion", es: "León", emoji: "🦁", bg: "#d4a017" },
    { pt: "Elefante", en: "Elephant", es: "Elefante", emoji: "🐘", bg: "#808b96" },
    { pt: "Girafa", en: "Giraffe", es: "Jirafa", emoji: "🦒", bg: "#f39c12" },
    { pt: "Tigre", en: "Tiger", es: "Tigre", emoji: "🐯", bg: "#e67e22" },
    { pt: "Zebra", en: "Zebra", es: "Cebra", emoji: "🦓", bg: "#2c3e50" },
    { pt: "Gorila", en: "Gorilla", es: "Gorila", emoji: "🦍", bg: "#212f3d" },
    { pt: "Panda", en: "Panda", es: "Panda", emoji: "🐼", bg: "#fdfefe" },
    { pt: "Hipopótamo", en: "Hippo", es: "Hipopótamo", emoji: "🦛", bg: "#566573" },
    { pt: "Jacaré", en: "Crocodile", es: "Cocodrilo", emoji: "🐊", bg: "#145a32" },
    { pt: "Tartaruga", en: "Turtle", es: "Tortuga", emoji: "🐢", bg: "#1e8449" },
    { pt: "Cobra", en: "Snake", es: "Serpiente", emoji: "🐍", bg: "#1d8348" },
    { pt: "Pinguim", en: "Penguin", es: "Pingüino", emoji: "🐧", bg: "#2e86c1" },
    { pt: "Tubarão", en: "Shark", es: "Tiburón", emoji: "🦈", bg: "#2874a6" },
    { pt: "Polvo", en: "Octopus", es: "Pulpo", emoji: "🐙", bg: "#884ea0" },
    { pt: "Abelha", en: "Bee", es: "Abeja", emoji: "🐝", bg: "#f1c40f" },
    { pt: "Borboleta", en: "Butterfly", es: "Mariposa", emoji: "🦋", bg: "#5dade2" },
    { pt: "Cachorro", en: "Dog", es: "Perro", emoji: "🐶", bg: "#af601a" },
    { pt: "Gato", en: "Cat", es: "Gato", emoji: "🐱", bg: "#d68910" },
    { pt: "Coelho", en: "Rabbit", es: "Conejo", emoji: "🐰", bg: "#7f8c8d" },
    { pt: "Porco", en: "Pig", es: "Cerdo", emoji: "🐷", bg: "#ec7063" },
    { pt: "Vaca", en: "Cow", es: "Vaca", emoji: "🐮", bg: "#515a5a" },
    { pt: "Galinha", en: "Chicken", es: "Pollo", emoji: "🐔", bg: "#f4d03f" },
    { pt: "Macaco", en: "Monkey", es: "Mono", emoji: "🐵", bg: "#a0522d" },
    { pt: "Sapo", en: "Frog", es: "Rana", emoji: "🐸", bg: "#229954" },
    { pt: "Rinoceronte", en: "Rhino", es: "Rinoceronte", emoji: "🦏", bg: "#5d6d7e" },
    { pt: "Canguru", en: "Kangaroo", es: "Canguro", emoji: "🦘", bg: "#a04000" },
    { pt: "Baleia", en: "Whale", es: "Ballena", emoji: "🐳", bg: "#1a5276" },
    { pt: "Caracol", en: "Snail", es: "Caracol", emoji: "🐌", bg: "#7e5109" }
  ];

  let currentIdx = -1;
  let mediaRecorder;
  let audioChunks = { pt: null, es: null, en: null };

  function nextAnimal() {
    let newIdx;
    do { newIdx = Math.floor(Math.random() * animals.length); } while (newIdx === currentIdx);
    currentIdx = newIdx;
    const animal = animals[currentIdx];
    
    document.getElementById('animalEmoji').textContent = animal.emoji;
    document.getElementById('label-pt').textContent = animal.pt;
    document.getElementById('label-es').textContent = animal.es;
    document.getElementById('label-en').textContent = animal.en;
    document.getElementById('card').style.background = `linear-gradient(135deg, ${animal.bg}, #0b1a30)`;
    
    ['pt', 'es', 'en'].forEach(l => {
        audioChunks[l] = null;
        document.getElementById(`play-${l}`).disabled = true;
    });
    window.speechSynthesis.cancel();
  }

  function speak(langCode) {
    window.speechSynthesis.cancel();
    const animal = animals[currentIdx];
    const text = langCode === 'pt' ? animal.pt : (langCode === 'es' ? animal.es : animal.en);
    const utterance = new SpeechSynthesisUtterance(text);

    if (langCode === 'pt') { utterance.lang = 'pt-BR'; }
    else if (langCode === 'es') { 
      utterance.lang = 'es-MX'; 
      const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('MX'));
      if(v) utterance.voice = v;
    } else { 
      utterance.lang = 'en-US'; 
      utterance.rate = 0.6; 
    }
    window.speechSynthesis.speak(utterance);
  }

  async function startRecording(lang) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      let chunks = [];
      const btn = document.getElementById(`rec-${lang}`);
      btn.classList.add('recording');

      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        audioChunks[lang] = URL.createObjectURL(blob);
        document.getElementById(`play-${lang}`).disabled = false;
        btn.classList.remove('recording');
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 3000);
    } catch (e) { alert("Ative o microfone!"); }
  }

  function playRecording(lang) {
    if (audioChunks[lang]) new Audio(audioChunks[lang]).play();
  }

  // Estrelas
  const sc = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = s.style.height = (Math.random() * 3) + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (Math.random() * 3 + 1) + 's');
    sc.appendChild(s);
  }

  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  nextAnimal();
</script>
</body>
</html>
