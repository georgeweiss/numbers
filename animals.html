<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Safari: 100 Animais!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0b1a30; min-height: 100vh; font-family: 'Baloo 2', cursive; overflow-x: hidden; user-select: none; }
  
  .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  .screen { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; gap: 15px; }
  .hidden { display: none !important; }

  .menu-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #a3ffac; text-align: center; text-shadow: 0 4px 0 #2d6a31; line-height: 1.2; }
  .btn-start { padding: 18px 45px; font-size: 1.6rem; font-family: 'Fredoka One', cursive; background: #2ecc71; color: #fff; border: 5px solid #fff; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #27ae60; transition: 0.2s; margin-top: 20px; }

  .card { width: min(260px, 70vw); aspect-ratio: 1; border-radius: 35px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 5px solid rgba(255,255,255,0.3); animation: float 4s ease-in-out infinite; margin-bottom: 10px; gap: 10px; position: relative; overflow: hidden; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  
  .animal-emoji { font-size: 100px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); z-index: 2; }
  .animal-name-tag { color: white; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; z-index: 2; letter-spacing: 1px; }

  .lang-container { display: flex; gap: 10px; width: 100%; max-width: 450px; justify-content: center; }
  .lang-column { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  
  .lang-btn { width: 100%; padding: 10px 2px; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: 800; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .lang-btn-pt { background: #009c3b; box-shadow: 0 4px 0 #006622; }
  .lang-btn-es { background: #d52b1e; box-shadow: 0 4px 0 #8a0015; }
  .lang-btn-en { background: #00247d; box-shadow: 0 4px 0 #001a5c; }

  .record-tools-stack { display: flex; flex-direction: column; gap: 5px; width: 100%; }
  .tool-btn { width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.15); color: white; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
  .tool-btn:disabled { opacity: 0.1; cursor: not-allowed; }
  
  .recording { background: #ff4444 !important; animation: pulse-red 1s infinite; box-shadow: 0 0 15px #ff4444; }
  @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

  .next-btn { margin-top: 15px; padding: 15px 35px; background: #ffe066; border: none; border-radius: 25px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #5e3a00; cursor: pointer; box-shadow: 0 6px 0 #b37700; }
  .counter { color: #a3ffac; font-size: 0.9rem; font-weight: bold; margin-bottom: -10px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="screen" id="menuScreen">
  <div class="menu-title">🦁 MEGA SAFARI<br>100 ANIMAIS!</div>
  <button class="btn-start" onclick="startGame()">COMEÇAR JORNADA</button>
</div>

<div class="screen hidden" id="gameScreen">
  <div class="counter" id="counterUI">Animal 1 de 100</div>
  <div class="card" id="card">
    <div class="animal-emoji" id="animalEmoji">🦁</div>
    <div class="animal-name-tag" id="animalLabel">LEÃO</div>
  </div>

  <div class="lang-container">
    <div class="lang-column">
      <button class="lang-btn lang-btn-pt" onclick="speak('pt')"><span>🇧🇷 PT</span><span>🔊</span></button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-pt" onclick="startRecording('pt')">🎙️</button>
        <button class="tool-btn" id="play-pt" onclick="playRecording('pt')" disabled>▶️</button>
      </div>
    </div>
    <div class="lang-column">
      <button class="lang-btn lang-btn-es" onclick="speak('es')"><span>🇲🇽 MX</span><span>🔊</span></button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-es" onclick="startRecording('es')">🎙️</button>
        <button class="tool-btn" id="play-es" onclick="playRecording('es')" disabled>▶️</button>
      </div>
    </div>
    <div class="lang-column">
      <button class="lang-btn lang-btn-en" onclick="speak('en')"><span>🇺🇸 EN</span><span>🔊</span></button>
      <div class="record-tools-stack">
        <button class="tool-btn" id="rec-en" onclick="startRecording('en')">🎙️</button>
        <button class="tool-btn" id="play-en" onclick="playRecording('en')" disabled>▶️</button>
      </div>
    </div>
  </div>

  <button class="next-btn" onclick="nextAnimal()">PRÓXIMO ➔</button>
</div>

  let currentIdx = 0;
  let animalCounter = 0;
  let mediaRecorder;
  let audioChunks = { pt: null, es: null, en: null };

  // Fundo de estrelas
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = s.style.height = (Math.random() * 3) + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (Math.random() * 3 + 1) + 's');
    starsContainer.appendChild(s);
  }

  function startGame() {
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    nextAnimal();
  }

  function nextAnimal() {
    // Escolha aleatória que não repete o mesmo bicho imediatamente
    let newIdx;
    do { newIdx = Math.floor(Math.random() * animals.length); } while (newIdx === currentIdx);
    currentIdx = newIdx;
    
    animalCounter++;
    const animal = animals[currentIdx];
    
    document.getElementById('animalEmoji').textContent = animal.emoji;
    document.getElementById('animalLabel').textContent = animal.pt;
    document.getElementById('card').style.background = `linear-gradient(135deg, ${animal.bg}, #0b1a30)`;
    document.getElementById('counterUI').textContent = `Animal ${animalCounter} de 100`;
    
    // Resetar botões de play
    ['pt', 'es', 'en'].forEach(l => {
        audioChunks[l] = null;
        document.getElementById(`play-${l}`).disabled = true;
    });
    window.speechSynthesis.cancel();
  }

  function speak(langCode) {
    window.speechSynthesis.cancel();
    const animal = animals[currentIdx];
    const text = langCode === 'pt' ? animal.pt : (langCode === 'es' ? animal.es : animal.en);
    const utterance = new SpeechSynthesisUtterance(text);

    if (langCode === 'pt') { utterance.lang = 'pt-BR'; }
    else if (langCode === 'es') { 
        utterance.lang = 'es-MX'; 
        const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('MX'));
        if(v) utterance.voice = v;
    }
    else { utterance.lang = 'en-US'; utterance.rate = 0.6; }
    window.speechSynthesis.speak(utterance);
  }

  async function startRecording(lang) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      let localChunks = [];
      const btn = document.getElementById(`rec-${lang}`);
      btn.classList.add('recording');

      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) localChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(localChunks, { type: mimeType });
        audioChunks[lang] = URL.createObjectURL(audioBlob);
        document.getElementById(`play-${lang}`).disabled = false;
        btn.classList.remove('recording');
        stream.getTracks().forEach(track => track.stop());
      };
      mediaRecorder.start();
      setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 3000);
    } catch (err) { alert("Ative o microfone para gravar!"); }
  }

  function playRecording(lang) {
    if (audioChunks[lang]) {
        const audio = new Audio(audioChunks[lang]);
        audio.play().catch(e => console.log("Erro Play:", e));
    }
  }

  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
