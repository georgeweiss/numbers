<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000005; overflow: hidden; touch-action: none; }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom), 20px);
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    pointer-events: none;
  }
  #planet-label {
    color: rgba(255,255,255,0.75);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(0,0,0,0.45);
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: opacity 0.35s ease;
  }
  #hint { color: rgba(255,255,255,0.15); font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 2px; }
  #zoom-btns {
    position: fixed; right: 16px; bottom: 90px;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: all;
  }
  .zbtn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.55);
    font-size: 24px; line-height: 42px; text-align: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="planet-label">SISTEMA SOLAR</div>
  <div id="hint">pinch zoom &bull; arraste para mover</div>
</div>
<div id="zoom-btns">
  <div class="zbtn" id="zin">+</div>
  <div class="zbtn" id="zout">-</div>
</div>
<script>
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

var cam = { x: 0, y: 0, zoom: 1 };
var BASE_SCALE = Math.min(window.innerWidth, window.innerHeight) / 1300;

// Stars
var stars = [];
for (var i = 0; i < 650; i++) {
stars.push({
x: (Math.random() - 0.5) * 3000,
y: (Math.random() - 0.5) * 3000,
r: Math.random() * 1.3,
alpha: 0.15 + Math.random() * 0.85,
tw: Math.random() * Math.PI * 2,
tws: 0.008 + Math.random() * 0.018
});
}

// Planets
var planets = [
{ name: “Mercurio”, orbit: 68,  r: 4,  color: “#b5b5b5”, glow: “#888888”, speed: 0.047, angle: Math.random()*6.28, trail: [] },
{ name: “Venus”,    orbit: 105, r: 6,  color: “#e8c97a”, glow: “#d4a84b”, speed: 0.035, angle: Math.random()*6.28, trail: [] },
{ name: “Terra”,    orbit: 148, r: 7,  color: “#4fa3e0”, glow: “#2a7fcf”, speed: 0.029, angle: Math.random()*6.28, trail: [],
moons: [{ r: 1.8, orbit: 16, angle: 0, speed: 0.09, color: “#cccccc” }] },
{ name: “Marte”,    orbit: 198, r: 5.5,color: “#c1440e”, glow: “#9e3009”, speed: 0.024, angle: Math.random()*6.28, trail: [],
moons: [
{ r: 1.2, orbit: 11, angle: 0,   speed: 0.14, color: “#aaaaaa” },
{ r: 1.0, orbit: 16, angle: 2.1, speed: 0.07, color: “#999999” }
]},
{ name: “Jupiter”,  orbit: 285, r: 22, color: “#c88b3a”, glow: “#a06820”, speed: 0.013, angle: Math.random()*6.28, trail: [],
bands: [”#d4a55a”,”#b87030”,”#e8c070”,”#a05820”,”#ddb060”],
moons: [
{ r: 2.0, orbit: 32, angle: 0,   speed: 0.07, color: “#e0c080” },
{ r: 1.8, orbit: 42, angle: 1.5, speed: 0.05, color: “#c0a060” },
{ r: 2.5, orbit: 54, angle: 3.0, speed: 0.04, color: “#d0b870” },
{ r: 1.8, orbit: 66, angle: 5.0, speed: 0.03, color: “#b89050” }
]},
{ name: “Saturno”,  orbit: 375, r: 18, color: “#e8d5a0”, glow: “#c8b060”, speed: 0.009, angle: Math.random()*6.28, trail: [],
rings: true, tilt: 0.46,
moons: [
{ r: 2.5, orbit: 44, angle: 0,   speed: 0.06, color: “#e0d090” },
{ r: 1.8, orbit: 60, angle: 2.0, speed: 0.04, color: “#c0b070” }
]},
{ name: “Urano”,    orbit: 460, r: 13, color: “#7de8e8”, glow: “#40c8c8”, speed: 0.006, angle: Math.random()*6.28, trail: [],
rings: true, tilt: 1.51,
moons: [{ r: 1.3, orbit: 24, angle: 0, speed: 0.08, color: “#aaeeff” }] },
{ name: “Netuno”,   orbit: 545, r: 12, color: “#4060f8”, glow: “#2040d0”, speed: 0.004, angle: Math.random()*6.28, trail: [],
moons: [{ r: 1.8, orbit: 23, angle: 1.0, speed: 0.07, color: “#8899ff” }] }
];

// Asteroids
var asteroids = [];
for (var i = 0; i < 200; i++) {
asteroids.push({
angle: Math.random() * 6.28,
orbit: 228 + Math.random() * 38,
speed: 0.002 + Math.random() * 0.005,
r: 0.5 + Math.random() * 1.2,
alpha: 0.25 + Math.random() * 0.5
});
}

var TRAIL = 60;
var sunRot = 0;
var t = 0;
var labelEl = document.getElementById(“planet-label”);

function hexRgb(hex) {
return parseInt(hex.slice(1,3),16)+”,”+parseInt(hex.slice(3,5),16)+”,”+parseInt(hex.slice(5,7),16);
}

function drawSun() {
// Far corona
var c1 = ctx.createRadialGradient(0,0,0, 0,0,130);
c1.addColorStop(0,   “rgba(255,220,100,0.18)”);
c1.addColorStop(0.45,“rgba(255,120,20,0.07)”);
c1.addColorStop(1,   “rgba(255,60,0,0)”);
ctx.beginPath(); ctx.arc(0,0,130,0,Math.PI*2);
ctx.fillStyle = c1; ctx.fill();

// Inner glow
var c2 = ctx.createRadialGradient(0,0,0, 0,0,65);
c2.addColorStop(0,   “rgba(255,255,210,1)”);
c2.addColorStop(0.35,“rgba(255,200,60,0.85)”);
c2.addColorStop(0.7, “rgba(255,130,15,0.55)”);
c2.addColorStop(1,   “rgba(255,60,0,0)”);
ctx.beginPath(); ctx.arc(0,0,65,0,Math.PI*2);
ctx.fillStyle = c2; ctx.fill();

// Body
ctx.save(); ctx.rotate(sunRot);
var body = ctx.createRadialGradient(-8,-10,0, 0,0,30);
body.addColorStop(0,   “rgba(255,255,230,1)”);
body.addColorStop(0.5, “rgba(255,195,55,1)”);
body.addColorStop(1,   “rgba(255,110,10,1)”);
ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2);
ctx.fillStyle = body; ctx.fill();

// Sunspots
ctx.globalAlpha = 0.22;
[[7,-9,4],[-12,7,3],[14,11,3],[-7,-15,2]].forEach(function(s){
ctx.beginPath(); ctx.arc(s[0],s[1],s[2],0,Math.PI*2);
ctx.fillStyle=”#b04500”; ctx.fill();
});
ctx.globalAlpha = 1;

// Flares
var inv = 1 / (cam.zoom * BASE_SCALE);
for (var f = 0; f < 8; f++) {
var fa = (f/8)*Math.PI*2 + t*0.25;
var fl = 32 + Math.sin(t*1.8 + f*0.9)*10;
ctx.beginPath();
ctx.moveTo(Math.cos(fa)*27, Math.sin(fa)*27);
ctx.lineTo(Math.cos(fa)*fl, Math.sin(fa)*fl);
ctx.strokeStyle = “rgba(255,”+(150+f*8)+”,30,0.45)”;
ctx.lineWidth = 2*inv; ctx.stroke();
}
ctx.restore();
}

function drawOrbit(r) {
var inv = 1/(cam.zoom*BASE_SCALE);
ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
ctx.strokeStyle = “rgba(255,255,255,0.04)”;
ctx.lineWidth = 0.8*inv;
ctx.setLineDash([4*inv, 9*inv]); ctx.stroke(); ctx.setLineDash([]);
}

function drawRings(px, py, pr, tilt) {
ctx.save(); ctx.translate(px, py);
var rings = [
{ inn: pr*1.28, out: pr*1.58, a: 0.38 },
{ inn: pr*1.65, out: pr*2.05, a: 0.22 },
{ inn: pr*2.12, out: pr*2.42, a: 0.12 }
];
rings.forEach(function(ring){
var rx = (ring.inn+ring.out)/2;
var ry = rx*Math.abs(Math.sin(tilt))+1;
var rw = ring.out - ring.inn;
ctx.beginPath();
ctx.ellipse(0,0, rx+rw/2, ry, 0, 0, Math.PI*2);
ctx.strokeStyle = “rgba(220,200,140,”+ring.a+”)”;
ctx.lineWidth = rw*0.65; ctx.stroke();
});
ctx.restore();
}

function drawPlanet(p) {
var px = Math.cos(p.angle)*p.orbit;
var py = Math.sin(p.angle)*p.orbit;

// Trail
p.trail.push({x:px, y:py});
if (p.trail.length > TRAIL) p.trail.shift();
var rgb = hexRgb(p.color);
var inv = 1/(cam.zoom*BASE_SCALE);
for (var i=1; i<p.trail.length; i++) {
var a = (i/p.trail.length)*0.28;
ctx.beginPath();
ctx.moveTo(p.trail[i-1].x, p.trail[i-1].y);
ctx.lineTo(p.trail[i].x, p.trail[i].y);
ctx.strokeStyle = “rgba(”+rgb+”,”+a+”)”;
ctx.lineWidth = 1.5*inv; ctx.stroke();
}

// Glow
var grd = ctx.createRadialGradient(px,py,0, px,py,p.r*3.5);
grd.addColorStop(0,“rgba(”+rgb+”,0.35)”);
grd.addColorStop(1,“rgba(”+rgb+”,0)”);
ctx.beginPath(); ctx.arc(px,py,p.r*3.5,0,Math.PI*2);
ctx.fillStyle=grd; ctx.fill();

// Rings behind
if (p.rings) drawRings(px,py,p.r,p.tilt);

// Body
if (p.bands) {
ctx.save();
ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.clip();
var bb = ctx.createRadialGradient(px-p.r*0.3,py-p.r*0.3,0, px,py,p.r);
bb.addColorStop(0,”#e8c060”); bb.addColorStop(1,”#7a4208”);
ctx.fillStyle=bb; ctx.fillRect(px-p.r,py-p.r,p.r*2,p.r*2);
for (var b=0; b<p.bands.length; b++) {
var by = py-p.r+(b/p.bands.length)*p.r*2;
ctx.fillStyle=p.bands[b]+“88”;
ctx.fillRect(px-p.r,by,p.r*2,p.r*0.32);
}
ctx.restore();
} else {
var g2 = ctx.createRadialGradient(px-p.r*0.35,py-p.r*0.35,p.r*0.05, px,py,p.r);
g2.addColorStop(0,“rgba(255,255,255,0.55)”);
g2.addColorStop(0.3,p.color);
g2.addColorStop(1,p.glow);
ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2);
ctx.fillStyle=g2; ctx.fill();
}

// Moons
if (p.moons) {
p.moons.forEach(function(m){
m.angle += m.speed;
var mx = px+Math.cos(m.angle)*m.orbit;
var my = py+Math.sin(m.angle)*m.orbit*0.4;
ctx.beginPath(); ctx.arc(mx,my,m.r,0,Math.PI*2);
ctx.fillStyle=m.color; ctx.globalAlpha=0.8; ctx.fill(); ctx.globalAlpha=1;
});
}

p.angle += p.speed;
}

// ── Tap to show planet name ─────────────────────────────────────────
var labelTimeout = null;

function getPlanetAtScreen(tx, ty) {
var scale = cam.zoom * BASE_SCALE;
var best = null, bestD = Infinity;
// Also check Sun
var sunSx = W/2 + cam.x, sunSy = H/2 + cam.y;
var dSun = Math.sqrt((tx-sunSx)*(tx-sunSx)+(ty-sunSy)*(ty-sunSy));
if (dSun < 36*scale) return { name: “SOL” };

planets.forEach(function(p){
var wx = Math.cos(p.angle - p.speed)*p.orbit*scale + W/2 + cam.x;
var wy = Math.sin(p.angle - p.speed)*p.orbit*scale + H/2 + cam.y;
var hitR = Math.max(22, p.r*scale*2.5);
var d = Math.sqrt((tx-wx)*(tx-wx)+(ty-wy)*(ty-wy));
if (d < hitR && d < bestD) { bestD=d; best=p; }
});
return best;
}

function showLabel(name) {
labelEl.textContent = name;
labelEl.style.opacity = “1”;
if (labelTimeout) clearTimeout(labelTimeout);
labelTimeout = setTimeout(function(){
labelEl.style.opacity = “0”;
setTimeout(function(){ labelEl.textContent = “SISTEMA SOLAR”; labelEl.style.opacity = “1”; }, 400);
}, 2500);
}

// ── Touch controls ───────────────────────────────────────────────────
var drag = { on: false, lx: 0, ly: 0, moved: false };
var pinch = { on: false, ld: 0 };

canvas.addEventListener(“touchstart”, function(e){
e.preventDefault();
var ts = e.touches;
if (ts.length === 1) {
drag.on=true; drag.moved=false;
drag.lx=ts[0].clientX; drag.ly=ts[0].clientY;
drag.sx=ts[0].clientX; drag.sy=ts[0].clientY;
} else if (ts.length === 2) {
drag.on=false; pinch.on=true;
var dx=ts[0].clientX-ts[1].clientX, dy=ts[0].clientY-ts[1].clientY;
pinch.ld = Math.sqrt(dx*dx+dy*dy);
}
},{passive:false});

canvas.addEventListener(“touchmove”, function(e){
e.preventDefault();
var ts = e.touches;
if (drag.on && ts.length===1) {
var mdx = ts[0].clientX-drag.sx, mdy = ts[0].clientY-drag.sy;
if (Math.sqrt(mdx*mdx+mdy*mdy) > 8) drag.moved=true;
cam.x += ts[0].clientX-drag.lx; cam.y += ts[0].clientY-drag.ly;
drag.lx=ts[0].clientX; drag.ly=ts[0].clientY;
} else if (pinch.on && ts.length===2) {
var dx=ts[0].clientX-ts[1].clientX, dy=ts[0].clientY-ts[1].clientY;
var d=Math.sqrt(dx*dx+dy*dy);
cam.zoom = Math.max(0.25, Math.min(6, cam.zoom*(d/pinch.ld)));
pinch.ld=d;
}
},{passive:false});

canvas.addEventListener(“touchend”, function(e){
// If finger lifted without moving = tap
if (drag.on && !drag.moved && e.changedTouches.length===1) {
var tx = e.changedTouches[0].clientX;
var ty = e.changedTouches[0].clientY;
var hit = getPlanetAtScreen(tx, ty);
if (hit) showLabel(hit.name.toUpperCase());
}
if (e.touches.length===0){drag.on=false; pinch.on=false;}
});

document.getElementById(“zin”).addEventListener(“click”, function(){ cam.zoom=Math.min(6,cam.zoom*1.28); });
document.getElementById(“zout”).addEventListener(“click”, function(){ cam.zoom=Math.max(0.25,cam.zoom/1.28); });

// ── Animate ──────────────────────────────────────────────────────────
var frame = 0;
function animate() {
requestAnimationFrame(animate);
frame++; t+=0.016; sunRot+=0.003;

ctx.fillStyle = “rgba(0,0,5,0.26)”;
ctx.fillRect(0,0,W,H);

var scale = cam.zoom * BASE_SCALE;

// Stars (subtle parallax with pan)
stars.forEach(function(s){
s.tw += s.tws;
var a = s.alpha*(0.5+0.5*Math.sin(s.tw));
var sx = ((s.x + W/2 + cam.x*0.05) % (W*2) + W*2) % (W*2);
var sy = ((s.y + H/2 + cam.y*0.05) % (H*2) + H*2) % (H*2);
ctx.beginPath(); ctx.arc(sx,sy,s.r,0,Math.PI*2);
ctx.fillStyle=“rgba(255,255,255,”+a+”)”; ctx.fill();
});

ctx.save();
ctx.translate(W/2+cam.x, H/2+cam.y);
ctx.scale(scale, scale);

// Orbits
planets.forEach(function(p){ drawOrbit(p.orbit); });

// Asteroid belt
asteroids.forEach(function(a){
a.angle+=a.speed;
ctx.beginPath();
ctx.arc(Math.cos(a.angle)*a.orbit, Math.sin(a.angle)*a.orbit, a.r,0,Math.PI*2);
ctx.fillStyle=“rgba(155,135,115,”+a.alpha+”)”; ctx.fill();
});

// Planets
planets.forEach(function(p){ drawPlanet(p); });

// Sun on top
drawSun();

ctx.restore();

if (frame % 60 === 0) {} // label updated only on tap
}

animate();
</script>

</body>
</html>
